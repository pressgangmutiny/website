server {
    listen 80;
    server_name pressgangmutiny.com www.pressgangmutiny.com;
    return 301 https://www.pressgangmutiny.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pressgangmutiny.com;
    return 301 https://www.pressgangmutiny.com$request_uri;

    ssl_certificate     /etc/letsencrypt/live/pressgangmutiny.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pressgangmutiny.com/privkey.pem;
}

server {
    listen 443 ssl http2;
    server_name www.pressgangmutiny.com;

    ssl_certificate     /etc/letsencrypt/live/pressgangmutiny.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pressgangmutiny.com/privkey.pem;

    root /var/www/pressgangmutiny.com;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(css|js|woff2?|ttf|eot|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(jpg|jpeg|png|webp|gif)$ {
        expires 6M;
        add_header Cache-Control "public";
    }

    # Hugo generates clean URLs — try file, then directory, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 301 redirects from old Wix URLs
    location = /across-the-western-ocean      { return 301 /; }
    location = /product-page/across-the-western-ocean         { return 301 /; }
    location = /product-page/across-the-western-ocean-digital { return 301 /; }
    location = /product-page/east-coast-tour-ep-digital-1     { return 301 /; }
    location = /product-page/pressgang-mutiny                 { return 301 /; }
    location = /product-page/pressgang-mutiny-digital         { return 301 /; }
    location = /shop          { return 301 https://pressgangmutiny.bandcamp.com; }
    location = /podcast       { return 301 /the-shanty-show/; }
    location = /news/old-mick { return 301 /news/old-mick/; }

    error_page 404 /404.html;
}
