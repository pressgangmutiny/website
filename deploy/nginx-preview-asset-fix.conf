# Add these three location blocks to /etc/nginx/sites-enabled/bellweatherprotocol.com
# Place them BEFORE the existing /preview/ block and BEFORE the catch-all location /
#
# These serve Hugo's static assets (css, img, fonts) at their root-relative paths
# so the browser can find them regardless of the /preview/ path prefix.

    location /css/ {
        alias /root/bellweather/workspaces/astrid/pressgangmutiny-site/public/css/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /img/ {
        alias /root/bellweather/workspaces/astrid/pressgangmutiny-site/public/img/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /fonts/ {
        alias /root/bellweather/workspaces/astrid/pressgangmutiny-site/public/fonts/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
