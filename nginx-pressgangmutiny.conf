# nginx config for pressgangmutiny.com
# Drop into /etc/nginx/sites-available/pressgangmutiny and symlink to sites-enabled

server {
    listen 80;
    server_name pressgangmutiny.com www.pressgangmutiny.com;
    return 301 https://www.pressgangmutiny.com$request_uri;
}

server {
    listen 443 ssl;
    server_name pressgangmutiny.com;
    return 301 https://www.pressgangmutiny.com$request_uri;

    ssl_certificate     /etc/letsencrypt/live/pressgangmutiny.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pressgangmutiny.com/privkey.pem;
}

server {
    listen 443 ssl;
    server_name www.pressgangmutiny.com;

    ssl_certificate     /etc/letsencrypt/live/pressgangmutiny.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pressgangmutiny.com/privkey.pem;

    root /var/www/pressgangmutiny;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets aggressively
    location ~* \.(css|js|woff2?|ttf|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML — short cache so updates propagate
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Wix URL redirects — maintain SEO equity
    rewrite ^/across-the-western-ocean/?$          /music/across-the-western-ocean/   permanent;
    rewrite ^/product-page/(.*)$                    /music/                            permanent;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Clean 404
    error_page 404 /404.html;
}
